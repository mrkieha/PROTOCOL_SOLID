<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tg-proxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #1c2333;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #7d8590;
    --accent:    #2f81f7;
    --accent-h:  #388bfd;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Шапка ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .topbar-logo span { color: var(--muted); }
  .topbar-sys {
    margin-left: auto;
    display: flex;
    gap: 18px;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .topbar-sys b { color: var(--text); }

  /* ── Карточки ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .card-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    border-radius: 8px 8px 0 0 !important;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-body { padding: 16px; }

  /* ── Статус-индикатор ── */
  .indicator {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }
  .indicator.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .indicator.off { background: var(--red); }

  /* ── Кнопки ── */
  .btn { font-size: 13px; font-family: var(--sans); border-radius: 6px; padding: 5px 14px; }
  .btn-primary   { background: var(--accent); border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h); }
  .btn-outline-secondary { border-color: var(--border); color: var(--muted); }
  .btn-outline-secondary:hover { border-color: #58a6ff; color: #58a6ff; }
  .btn-sm { padding: 3px 10px; font-size: 12px; }
  .btn-danger { background: #6e1d1a; border-color: #6e1d1a; }
  .btn-danger:hover { background: var(--red); border-color: var(--red); }

  /* ── Inputs ── */
  .form-control, .form-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-family: var(--mono);
    border-radius: 6px;
  }
  .form-control:focus, .form-select:focus {
    background: var(--bg);
    border-color: var(--accent);
    color: var(--text);
    box-shadow: 0 0 0 3px rgba(47,129,247,0.15);
  }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }

  /* ── Ссылка прокси ── */
  .proxy-link-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: #58a6ff;
    word-break: break-all;
    cursor: text;
    min-height: 36px;
  }

  /* ── QR ── */
  .qr-wrap {
    display: flex;
    justify-content: center;
    padding: 10px 0;
  }
  .qr-wrap img {
    border-radius: 8px;
    border: 1px solid var(--border);
    max-width: 180px;
  }

  /* ── Лог ── */
  .log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    height: 200px;
    overflow-y: auto;
    padding: 10px 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-box::-webkit-scrollbar { width: 4px; }
  .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Трафик ── */
  .traffic-row {
    display: flex;
    gap: 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .traffic-row span b { color: var(--text); }

  /* ── Toast ── */
  .toast-container { z-index: 9999; }
  .toast { font-size: 13px; min-width: 240px; }

  /* ── Badges ── */
  .badge-status {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .badge-on  { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
  .badge-off { background: rgba(248,81,73,.12); color: var(--red);   border: 1px solid rgba(248,81,73,.3); }

  /* ── Предупреждение (AWG fallback) ── */
  .warn-banner {
    background: rgba(210,153,34,.1);
    border: 1px solid rgba(210,153,34,.3);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--yellow);
    display: none;
  }

  /* ── Секция настроек AWG ── */
  .awg-params-info {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: none;
  }
  .awg-params-info.visible { display: block; }

  .section-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 768px) { .section-row { grid-template-columns: 1fr; } }

  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  hr { border-color: var(--border); opacity: 1; margin: 12px 0; }

  .copy-btn { cursor: pointer; }
  .copy-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<!-- ── Шапка ── -->
<div class="topbar">
  <i class="bi bi-shield-lock-fill" style="color:var(--accent);font-size:18px"></i>
  <div class="topbar-logo">tg<span>-</span>proxy</div>
  <div class="topbar-sys">
    <span>CPU: <b id="sys-cpu">—</b></span>
    <span>RAM: <b id="sys-ram">—</b></span>
    <span>OS: <b id="sys-os">—</b></span>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-body">OK</div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- ── Основной макет ── -->
<div class="layout">

  <!-- ════════════════ ЛЕВАЯ КОЛОНКА ════════════════ -->
  <div style="display:flex;flex-direction:column;gap:14px">

    <!-- ── AmneziaWG: настройки ── -->
    <div class="card">
      <div class="card-header">
        <i class="bi bi-diagram-3"></i> AmneziaWG туннель
        <span class="ms-auto d-flex align-items-center gap-2">
          <span id="awg-badge" class="badge-status badge-off">ВЫКЛ</span>
          <span id="awg-indicator" class="indicator off"></span>
        </span>
      </div>
      <div class="card-body">

        <div id="awg-warn-banner" class="warn-banner mb-3">
          <i class="bi bi-exclamation-triangle me-1"></i>
          <span id="awg-warn-text"></span>
        </div>

        <div class="section-row mb-3">
          <div>
            <label class="form-label">IP сервера</label>
            <input id="awg-ip" type="text" class="form-control" placeholder="1.2.3.4">
          </div>
          <div>
            <label class="form-label">
              Порт
              <span style="color:var(--yellow);font-size:10px" id="port-warn-inline"></span>
            </label>
            <input id="awg-port" type="number" class="form-control" placeholder="51820" value="51820">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Public Key сервера</label>
          <input id="awg-pubkey" type="text" class="form-control" placeholder="base64==">
        </div>

        <div class="mb-3">
          <label class="form-label">Preshared Key (опционально)</label>
          <input id="awg-psk" type="text" class="form-control" placeholder="оставь пустым если не нужен">
        </div>

        <button class="btn btn-primary w-100 mb-2" onclick="applyAwgConfig()">
          <i class="bi bi-sliders me-1"></i> Сгенерировать и применить конфиг
        </button>

        <div id="awg-junk-info" class="awg-params-info mt-2"></div>

        <hr>

        <div class="d-flex gap-2 mb-2">
          <button class="btn btn-outline-secondary flex-fill" onclick="tunnelStart()">
            <i class="bi bi-play-fill me-1"></i> Поднять туннель
          </button>
          <button class="btn btn-danger flex-fill" onclick="tunnelStop()">
            <i class="bi bi-stop-fill me-1"></i> Опустить
          </button>
        </div>

        <div id="awg-traffic" class="traffic-row mt-2" style="display:none">
          <span>↓ <b id="awg-rx">0 B</b></span>
          <span>↑ <b id="awg-tx">0 B</b></span>
          <span>Endpoint: <b id="awg-endpoint">—</b></span>
        </div>

      </div>
    </div>

    <!-- ── Системная информация ── -->
    <div class="card">
      <div class="card-header"><i class="bi bi-cpu"></i> Система</div>
      <div class="card-body" style="font-family:var(--mono);font-size:12px;color:var(--muted);line-height:2">
        <div>ОС: <b id="sys-os-full" style="color:var(--text)">—</b></div>
        <div>CPU: <b id="sys-cpu-full" style="color:var(--text)">—</b>%</div>
        <div>RAM: <b id="sys-ram-used" style="color:var(--text)">—</b> / <span id="sys-ram-total">—</span></div>
        <div>Аптайм: <b id="sys-uptime" style="color:var(--text)">—</b></div>
      </div>
    </div>

  </div>
  <!-- ════════════════ КОНЕЦ ЛЕВОЙ КОЛОНКИ ════════════════ -->


  <!-- ════════════════ ПРАВАЯ КОЛОНКА ════════════════ -->
  <div style="display:flex;flex-direction:column;gap:14px">

    <!-- ── MTProto прокси ── -->
    <div class="card">
      <div class="card-header">
        <i class="bi bi-send"></i> MTProto прокси
        <span class="ms-auto d-flex align-items-center gap-2">
          <span id="proxy-badge" class="badge-status badge-off">ВЫКЛ</span>
          <span id="proxy-indicator" class="indicator off"></span>
        </span>
      </div>
      <div class="card-body">

        <div class="mb-3">
          <label class="form-label">TLS-домен маскировки</label>
          <div class="d-flex gap-2">
            <select id="proxy-domain" class="form-select">
              <option value="">— авто (случайный) —</option>
            </select>
            <button class="btn btn-outline-secondary btn-sm" onclick="regenSecret()" title="Перегенерировать секрет">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">
            Трафик замаскируется под HTTPS к выбранному домену
          </div>
        </div>

        <div class="d-flex gap-2 mb-3">
          <button class="btn btn-primary flex-fill" onclick="proxyStart()">
            <i class="bi bi-play-fill me-1"></i> Старт
          </button>
          <button class="btn btn-outline-secondary" onclick="proxyRestart()">
            <i class="bi bi-arrow-repeat me-1"></i> Рестарт
          </button>
          <button class="btn btn-danger" onclick="proxyStop()">
            <i class="bi bi-stop-fill me-1"></i> Стоп
          </button>
        </div>

        <label class="form-label">Ссылка для Telegram</label>
        <div class="d-flex gap-2 mb-1">
          <div id="proxy-link" class="proxy-link-box flex-fill">не запущен</div>
          <button class="btn btn-outline-secondary btn-sm copy-btn" onclick="copyLink()" title="Скопировать">
            <i class="bi bi-clipboard"></i>
          </button>
        </div>

        <div id="proxy-pid" style="font-size:11px;color:var(--muted);margin-bottom:8px"></div>

        <div class="qr-wrap">
          <img id="proxy-qr" src="" alt="" style="display:none">
          <div id="proxy-qr-placeholder" style="color:var(--muted);font-size:12px;text-align:center;padding:20px 0">
            <i class="bi bi-qr-code" style="font-size:32px;display:block;margin-bottom:6px"></i>
            QR появится после старта
          </div>
        </div>

      </div>
    </div>

    <!-- ── Лог ── -->
    <div class="card">
      <div class="card-header">
        <i class="bi bi-terminal"></i> Лог mtprotoproxy
        <button class="btn btn-outline-secondary btn-sm ms-auto" onclick="clearLogView()">очистить вид</button>
      </div>
      <div class="card-body" style="padding:10px">
        <div id="log-box" class="log-box">ждём запуска...</div>
      </div>
    </div>

  </div>
  <!-- ════════════════ КОНЕЦ ПРАВОЙ КОЛОНКИ ════════════════ -->

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// =============================================================================
// Утилиты
// =============================================================================

const $ = id => document.getElementById(id);

function toast(msg, ok = true) {
  const el   = $('toast');
  const body = $('toast-body');
  body.textContent = msg;
  el.className = `toast align-items-center border-0 text-bg-${ok ? 'success' : 'danger'}`;
  bootstrap.Toast.getOrCreateInstance(el, { delay: 3500 }).show();
}

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// =============================================================================
// Загрузка доменов
// =============================================================================

async function loadDomains() {
  const data = await api('/api/proxy/domains');
  const sel  = $('proxy-domain');
  (data.domains || []).forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
}

// =============================================================================
// AWG — конфиг
// =============================================================================

async function applyAwgConfig() {
  const ip     = $('awg-ip').value.trim();
  const port   = parseInt($('awg-port').value) || 51820;
  const pubkey = $('awg-pubkey').value.trim();
  const psk    = $('awg-psk').value.trim();

  if (!ip || !pubkey) { toast('Заполни IP и Public Key сервера', false); return; }

  const data = await api('/api/tunnel/config', 'POST', {
    server_ip: ip,
    server_port: port,
    server_pubkey: pubkey,
    preshared_key: psk || null
  });

  if (data.ok) {
    toast('Конфиг применён');
    // Показываем junk-параметры
    const junk = data.junk_params;
    const info = $('awg-junk-info');
    if (junk && Object.keys(junk).length) {
      info.innerHTML = '🎲 Рандомные параметры обфускации:<br>' +
        Object.entries(junk).map(([k,v]) => `${k}=${v}`).join('  |  ');
      info.classList.add('visible');
    }
    if (data.warning) {
      showAwgWarn(data.warning);
    }
  } else {
    toast(data.error || 'Ошибка', false);
  }
}

function showAwgWarn(text) {
  const b = $('awg-warn-banner');
  $('awg-warn-text').textContent = text;
  b.style.display = 'block';
}

$('awg-port').addEventListener('input', function() {
  const p = parseInt(this.value);
  const w = $('port-warn-inline');
  if (p === 51820) {
    w.textContent = '⚠ может быть заблокирован';
  } else {
    w.textContent = '';
  }
});

// =============================================================================
// AWG — управление туннелем
// =============================================================================

async function tunnelStart() {
  const data = await api('/api/tunnel/start', 'POST');
  toast(data.ok ? 'Туннель поднят' : (data.error || 'Ошибка'), data.ok);
  updateStatus();
}

async function tunnelStop() {
  const data = await api('/api/tunnel/stop', 'POST');
  toast(data.ok ? 'Туннель остановлен' : (data.error || 'Ошибка'), data.ok);
  updateStatus();
}

// =============================================================================
// Прокси — управление
// =============================================================================

async function proxyStart() {
  const data = await api('/api/proxy/start', 'POST');
  toast(data.ok ? `Прокси запущен (PID ${data.pid})` : (data.error || 'Ошибка'), data.ok);
  setTimeout(updateStatus, 800);
}

async function proxyStop() {
  const data = await api('/api/proxy/stop', 'POST');
  toast('Прокси остановлен');
  updateStatus();
}

async function proxyRestart() {
  const data = await api('/api/proxy/restart', 'POST');
  toast(data.ok ? 'Прокси перезапущен' : (data.error || 'Ошибка'), data.ok);
  setTimeout(updateStatus, 800);
}

async function regenSecret() {
  const domain = $('proxy-domain').value || null;
  const data   = await api('/api/proxy/config', 'POST', { domain });
  toast(data.ok ? 'Секрет пересоздан' : (data.error || 'Ошибка'), data.ok);
  updateStatus();
}

function copyLink() {
  const link = $('proxy-link').textContent.trim();
  if (!link || link === 'не запущен') { toast('Ссылки нет', false); return; }
  navigator.clipboard.writeText(link).then(() => toast('Ссылка скопирована'));
}

function clearLogView() { $('log-box').textContent = ''; }

// =============================================================================
// Обновление статуса
// =============================================================================

function updateAwg(awg) {
  const on = awg.running;
  $('awg-indicator').className = `indicator ${on ? 'on' : 'off'}`;
  $('awg-badge').className     = `badge-status ${on ? 'badge-on' : 'badge-off'}`;
  $('awg-badge').textContent   = on ? 'ВКЛ' : 'ВЫКЛ';

  const traffic = $('awg-traffic');
  if (on) {
    traffic.style.display = 'flex';
    $('awg-rx').textContent       = awg.rx_human || '0 B';
    $('awg-tx').textContent       = awg.tx_human || '0 B';
    $('awg-endpoint').textContent = awg.endpoint || '—';
  } else {
    traffic.style.display = 'none';
  }

  if (!awg.is_amnezia && awg.awg_bin) {
    showAwgWarn('AmneziaWG не найден, используется WireGuard (без obfuscation). Трафик может быть обнаружен DPI.');
  }
}

function updateProxy(proxy) {
  const on = proxy.running;
  $('proxy-indicator').className = `indicator ${on ? 'on' : 'off'}`;
  $('proxy-badge').className     = `badge-status ${on ? 'badge-on' : 'badge-off'}`;
  $('proxy-badge').textContent   = on ? 'ВКЛ' : 'ВЫКЛ';

  const linkEl = $('proxy-link');
  const qrEl   = $('proxy-qr');
  const qrPh   = $('proxy-qr-placeholder');
  const pidEl  = $('proxy-pid');

  if (proxy.link) {
    linkEl.textContent = proxy.link;
  } else {
    linkEl.textContent = on ? 'получаем ссылку...' : 'не запущен';
  }

  if (proxy.qr) {
    qrEl.src = 'data:image/png;base64,' + proxy.qr;
    qrEl.style.display = 'block';
    qrPh.style.display = 'none';
  } else {
    qrEl.style.display = 'none';
    qrPh.style.display = 'block';
  }

  pidEl.textContent = on ? `PID: ${proxy.pid} | Порт: ${proxy.port || 443}` : '';
}

function updateSystem(sys) {
  if (!sys) return;
  const cpu  = sys.cpu ?? '—';
  const ram  = sys.ram || {};
  const os   = sys.distro || sys.os || '—';

  $('sys-cpu').textContent      = cpu + '%';
  $('sys-ram').textContent      = ram.used || '—';
  $('sys-cpu-full').textContent = cpu;
  $('sys-ram-used').textContent = ram.used   || '—';
  $('sys-ram-total').textContent= ram.total  || '—';
  $('sys-uptime').textContent   = sys.uptime || '—';
  $('sys-os').textContent       = os.length > 20 ? os.slice(0, 20) + '…' : os;
  $('sys-os-full').textContent  = os;
}

async function updateStatus() {
  try {
    const data = await api('/api/status');
    updateAwg(data.awg   || {});
    updateProxy(data.proxy || {});
    updateSystem(data.system || {});
  } catch (e) {
    console.warn('Ошибка получения статуса:', e);
  }
}

// =============================================================================
// Обновление логов
// =============================================================================

async function updateLogs() {
  try {
    const data  = await api('/api/proxy/logs');
    const lines = data.lines || [];
    if (lines.length) {
      const box = $('log-box');
      box.textContent = lines.join('\n');
      box.scrollTop   = box.scrollHeight;
    }
  } catch (e) {}
}

// =============================================================================
// Инициализация
// =============================================================================

document.addEventListener('DOMContentLoaded', async () => {
  await loadDomains();
  await updateStatus();
  await updateLogs();

  // Статус каждые 3 секунды
  setInterval(updateStatus, 3000);
  // Логи каждые 3 секунды
  setInterval(updateLogs, 3000);
});
</script>
</body>
</html>
